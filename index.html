<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD BELÉM - BARUERI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c27;
  --border:#2a2a3a;
  --accent:#7c6af7;
  --accent2:#f7826a;
  --green:#4ade80;
  --text:#f0f0f8;
  --muted:#6b6b8a;
  --radius:16px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

.header{
  padding:28px 20px 0;
  max-width:680px;
  margin:auto;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.church-name{
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:800;
  background:linear-gradient(135deg,#fff 40%,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.admin-btn,.filter-btn,.btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted);
  padding:8px 14px;
  border-radius:30px;
  cursor:pointer;
}

.filters{
  max-width:680px;
  margin:18px auto;
  padding:0 20px;
  display:flex;
  gap:8px;
}

.filter-btn.active{
  background:var(--accent);
  color:#fff;
}

.section{
  max-width:680px;
  margin:auto;
  padding:0 20px 40px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:12px;
}

.card-title{
  font-size:17px;
  font-weight:600;
  margin-bottom:8px;
}

.card-sub{
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}

.card-meta{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  font-size:12px;
  color:var(--muted);
}

.admin-actions{
  margin-top:14px;
  display:flex;
  gap:8px;
  opacity:0;
}

.admin-mode .admin-actions{
  opacity:1;
}

.fab{
  position:fixed;
  bottom:24px;
  right:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:var(--accent);
  border:none;
  color:#fff;
  font-size:24px;
  display:none;
  cursor:pointer;
}

.admin-mode .fab{
  display:block;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
}

.overlay.open{
  opacity:1;
  pointer-events:all;
}

.modal{
  width:90%;
  max-width:480px;
  background:var(--surface2);
  border-radius:20px;
  padding:24px;
}

.input{
  width:100%;
  margin-bottom:12px;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
}

.btn-primary{
  width:100%;
  background:var(--accent);
  border:none;
  color:#fff;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="church-name">Igreja Batista Central</div>
    <button class="admin-btn" onclick="openPin()">⚙ Admin</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="switchPage('agenda',this)">Agenda</button>
  <button class="filter-btn" onclick="switchPage('churches',this)">Igrejas</button>
</div>

<div class="section" id="agenda-page"></div>
<div class="section" id="churches-page" style="display:none"></div>

<button class="fab" onclick="openAdd()">+</button>

<div class="overlay" id="overlay">

  <div class="modal" id="pin-modal">
    <h2>Área Admin</h2>
    <input class="input" type="password" id="pin-input" placeholder="PIN">
    <button class="btn-primary" onclick="checkPin()">Entrar</button>
  </div>

  <div class="modal" id="event-modal" style="display:none">
    <h2 id="event-title">Novo Evento</h2>
    <input class="input" id="e-name" placeholder="Nome">
    <input class="input" id="e-date" type="date">
    <input class="input" id="e-time" type="time">
    <input class="input" id="e-local" placeholder="Local">
    <input class="input" id="e-desc" placeholder="Descrição">
    <button class="btn-primary" onclick="saveEvent()">Salvar</button>
  </div>

  <div class="modal" id="church-modal" style="display:none">
    <h2 id="church-title">Nova Igreja</h2>
    <input class="input" id="c-name" placeholder="Nome da igreja">
    <input class="input" id="c-pastor" placeholder="Pastor responsável">
    <input class="input" id="c-address" placeholder="Endereço">
    <input class="input" id="c-service" placeholder="Horários">
    <button class="btn-primary" onclick="saveChurch()">Salvar</button>
  </div>

</div>

<script>
const PIN = '1234';

let adminMode = false;
let currentPage = 'agenda';
let editingEvent = null;
let editingChurch = null;

let events = JSON.parse(localStorage.getItem('events')) || [
  {id:1,name:'Culto de Ensino',date:'2026-06-20',time:'19:30',local:'Templo Principal',desc:'Estudo da Palavra'}
];

let churches = JSON.parse(localStorage.getItem('churches')) || [
  {id:1,name:'Ministério Vida Nova',pastor:'Pr. João Almeida',address:'Rua das Oliveiras, 245',service:'Domingo 18:00'},
  {id:2,name:'Igreja Batista Esperança',pastor:'Pra. Ana Costa',address:'Av. Central, 890',service:'Quarta 19:30'}
];

function saveData(){
  localStorage.setItem('events', JSON.stringify(events));
  localStorage.setItem('churches', JSON.stringify(churches));
}

function switchPage(page, btn){
  currentPage = page;

  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('agenda-page').style.display = page==='agenda' ? '' : 'none';
  document.getElementById('churches-page').style.display = page==='churches' ? '' : 'none';

  render();
}

function render(){
  renderEvents();
  renderChurches();
}

function renderEvents(){
  let html='';

  events.forEach(ev=>{
    html+=`
      <div class="card">
        <div class="card-title">${ev.name}</div>
        <div class="card-sub">${ev.desc}</div>
        <div class="card-meta">
          <span>📅 ${ev.date}</span>
          <span>🕐 ${ev.time}</span>
          <span>📍 ${ev.local}</span>
        </div>

        <div class="admin-actions">
          <button class="btn" onclick="editEvent(${ev.id})">Editar</button>
          <button class="btn" onclick="deleteEvent(${ev.id})">Excluir</button>
        </div>
      </div>
    `;
  });

  document.getElementById('agenda-page').innerHTML = html;
}

function renderChurches(){
  let html='';

  churches.forEach(ch=>{
    html+=`
      <div class="card">
        <div class="card-title">${ch.name}</div>
        <div class="card-sub">Pastor: ${ch.pastor}</div>
        <div class="card-meta">
          <span>📍 ${ch.address}</span>
          <span>🕐 ${ch.service}</span>
        </div>

        <div class="admin-actions">
          <button class="btn" onclick="editChurch(${ch.id})">Editar</button>
          <button class="btn" onclick="deleteChurch(${ch.id})">Excluir</button>
        </div>
      </div>
    `;
  });

  document.getElementById('churches-page').innerHTML = html;
}

function openPin(){
  openModal('pin-modal');
}

function checkPin(){
  const pin = document.getElementById('pin-input').value;

  if(pin===PIN){
    adminMode=true;
    document.body.classList.add('admin-mode');
    closeModal();
  }
}

function openAdd(){
  if(currentPage==='agenda'){
    editingEvent = null;
    openModal('event-modal');
  } else {
    editingChurch = null;
    openModal('church-modal');
  }
}

function saveEvent(){
  const data = {
    id: editingEvent || Date.now(),
    name:e-name.value,
    date:e-date.value,
    time:e-time.value,
    local:e-local.value,
    desc:e-desc.value
  };

  if(editingEvent){
    events = events.map(e=>e.id===editingEvent?data:e);
  } else {
    events.push(data);
  }

  saveData();
  render();
  closeModal();
}

function saveChurch(){
  const data = {
    id: editingChurch || Date.now(),
    name:c-name.value,
    pastor:c-pastor.value,
    address:c-address.value,
    service:c-service.value
  };

  if(editingChurch){
    churches = churches.map(c=>c.id===editingChurch?data:c);
  } else {
    churches.push(data);
  }

  saveData();
  render();
  closeModal();
}

function editEvent(id){
  const ev = events.find(e=>e.id===id);
  editingEvent=id;

  e-name.value=ev.name;
  e-date.value=ev.date;
  e-time.value=ev.time;
  e-local.value=ev.local;
  e-desc.value=ev.desc;

  openModal('event-modal');
}

function editChurch(id){
  const ch = churches.find(c=>c.id===id);
  editingChurch=id;

  c-name.value=ch.name;
  c-pastor.value=ch.pastor;
  c-address.value=ch.address;
  c-service.value=ch.service;

  openModal('church-modal');
}

function deleteEvent(id){
  events = events.filter(e=>e.id!==id);
  saveData();
  render();
}

function deleteChurch(id){
  churches = churches.filter(c=>c.id!==id);
  saveData();
  render();
}

function openModal(id){
  document.getElementById('overlay').classList.add('open');

  document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
  document.getElementById(id).style.display='block';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('overlay').onclick = function(e){
  if(e.target===this) closeModal();
}

render();
</script>

</body>
</html>
